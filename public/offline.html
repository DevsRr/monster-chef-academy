<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monster Chef Academy Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #e8eef8, #f5f7fb);
        color: #0f172a;
        font-family: system-ui, sans-serif;
      }
      main {
        width: min(92vw, 520px);
        border-radius: 28px;
        padding: 32px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.16);
        text-align: center;
      }
      h1 {
        font-size: 2rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Kitchen is offline</h1>
      <p>Your local game progress is safe. Reopen Monster Chef Academy when the connection returns.</p>
    </main>
  </body>
</html>
